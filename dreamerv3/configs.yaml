defaults:

  logdir: null
  traindir: null
  evaldir: null
  offline_traindir: ''
  offline_evaldir: ''
  seed: 0
  deterministic_run: False
  steps: 1e6
  parallel: False
  eval_every: 1e4
  eval_episode_num: 10
  log_every: 1e4
  reset_every: 0
  device: 'cuda:0'
  compile: True
  precision: 32
  debug: False
  video_pred_log: True

  # Environment
  task: 'dmc_walker_walk'
  size: [64, 64]
  envs: 1
  action_repeat: 2
  time_limit: 1000
  grayscale: False
  prefill: 2500
  reward_EMA: True

  # Model
  dyn_hidden: 512
  dyn_deter: 512
  dyn_stoch: 32
  dyn_discrete: 32
  dyn_rec_depth: 1
  dyn_mean_act: 'none'
  dyn_std_act: 'sigmoid2'
  dyn_min_std: 0.1
  grad_heads: ['decoder', 'reward', 'cont']
  units: 512
  act: 'SiLU'
  norm: True
  encoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 1024, symlog_inputs: True}
  decoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 1024, cnn_sigmoid: False, image_dist: mse, vector_dist: symlog_mse, outscale: 1.0}
  actor:
    {layers: 2, dist: 'normal', entropy: 3e-4, unimix_ratio: 0.01, std: 'learned', min_std: 0.1, max_std: 1.0, temp: 0.1, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 1.0}
  critic:
    {layers: 2, dist: 'symlog_disc', slow_target: True, slow_target_update: 1, slow_target_fraction: 0.02, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 0.0}
  reward_head:
    {layers: 2, dist: 'symlog_disc', loss_scale: 1.0, outscale: 0.0}
  cont_head:
    {layers: 2, loss_scale: 1.0, outscale: 1.0}
  dyn_scale: 0.5
  rep_scale: 0.1
  kl_free: 1.0
  weight_decay: 0.0
  unimix_ratio: 0.01
  initial: 'learned'

  # Training
  batch_size: 16
  batch_length: 64
  train_ratio: 512
  pretrain: 100
  model_lr: 1e-4
  opt_eps: 1e-8
  grad_clip: 1000
  dataset_size: 1000000
  opt: 'adam'

  # Behavior.
  discount: 0.997
  discount_lambda: 0.95
  imag_horizon: 15
  imag_gradient: 'dynamics'
  imag_gradient_mix: 0.0
  eval_state_mean: False

  # Exploration
  expl_behavior: 'greedy'
  expl_until: 0
  expl_extr_scale: 0.0
  expl_intr_scale: 1.0
  disag_target: 'stoch'
  disag_log: True
  disag_models: 10
  disag_offset: 1
  disag_layers: 4
  disag_units: 400
  disag_action_cond: False

dmc_proprio:
  steps: 5e5
  action_repeat: 2
  envs: 4
  train_ratio: 512
  video_pred_log: false
  encoder: {mlp_keys: '.*', cnn_keys: '$^'}
  decoder: {mlp_keys: '.*', cnn_keys: '$^'}

dmc_vision:
  steps: 1e6
  action_repeat: 2
  envs: 4
  train_ratio: 512
  video_pred_log: true
  encoder: {mlp_keys: '$^', cnn_keys: 'image'}
  decoder: {mlp_keys: '$^', cnn_keys: 'image'}

crafter:
  task: crafter_reward
  step: 1e6
  action_repeat: 1
  envs: 1
  train_ratio: 512
  video_pred_log: true
  dyn_hidden: 1024
  dyn_deter: 4096
  units: 1024
  encoder: {mlp_keys: '$^', cnn_keys: 'image', cnn_depth: 96, mlp_layers: 5, mlp_units: 1024}
  decoder: {mlp_keys: '$^', cnn_keys: 'image', cnn_depth: 96, mlp_layers: 5, mlp_units: 1024}
  actor: {layers: 5, dist: 'onehot', std: 'none'}
  value: {layers: 5}
  reward_head: {layers: 5}
  cont_head: {layers: 5}
  imag_gradient: 'reinforce'

atari100k:
  steps: 4e5
  envs: 1
  action_repeat: 4
  train_ratio: 1024
  video_pred_log: true
  eval_episode_num: 100
  actor: {dist: 'onehot', std: 'none'}
  imag_gradient: 'reinforce'
  stickey: False
  lives: unused
  noops: 30
  resize: opencv
  actions: needed
  time_limit: 108000

minecraft:
  task: minecraft_diamond
  step: 1e8
  parallel: True
  envs: 16
  # no eval
  eval_episode_num: 0
  eval_every: 1e4
  action_repeat: 1
  train_ratio: 16
  video_pred_log: true
  dyn_hidden: 1024
  dyn_deter: 4096
  units: 1024
  encoder: {mlp_keys: 'inventory|inventory_max|equipped|health|hunger|breath|obs_reward', cnn_keys: 'image', cnn_depth: 96, mlp_layers: 5, mlp_units: 1024}
  decoder: {mlp_keys: 'inventory|inventory_max|equipped|health|hunger|breath', cnn_keys: 'image', cnn_depth: 96, mlp_layers: 5, mlp_units: 1024}
  actor: {layers: 5, dist: 'onehot', std: 'none'}
  value: {layers: 5}
  reward_head: {layers: 5}
  cont_head: {layers: 5}
  imag_gradient: 'reinforce'
  break_speed: 100.0
  time_limit: 36000

memorymaze:
  steps: 1e8
  action_repeat: 2
  actor: {dist: 'onehot', std: 'none'}
  imag_gradient: 'reinforce'
  task: 'memorymaze_9x9'

mario:
  task: mario_1-1
  steps: 5e5
  envs: 1
  parallel: False
  action_repeat: 4
  train_ratio: 512
  prefill: 5000
  time_limit: 4500
  grayscale: false
  size: [64, 64]
  video_pred_log: true
  eval_episode_num: 2
  eval_every: 1e4
  log_every: 2e3
  actor: {dist: 'onehot', std: 'none'}
  imag_gradient: 'reinforce'
  mario_action_set: 'simple'
  mario_sticky_jump_frames: 0
  mario_flag_base_bonus: 100.0
  mario_time_bonus_scale: 0.0
  mario_score_scale: 0.0
  mario_death_penalty: 0.0
  mario_hurdle_bonus: 0.0
  mario_hurdle_spacing: 400

# Stage-2 fine-tune: after mario_run1 first clears, copy latest.pt into a fresh
# logdir and launch with this config to reward speedruns.
# Reward structure (all non-negative):
#   forward_bonus = 0.05 * max(0, delta_x)          # uncleared ceiling ~160 at x=3200
#   clear_bonus   = 300 + 1.0 * time_remaining      # ONLY on flag_get, range [300, 700]
# => ANY clear >= 460   >>   ANY non-clear <= 160   (guaranteed dominance)
# => faster clear strictly better (0..+400 range)
mario_speed:
  task: mario_1-1
  steps: 3e5
  envs: 1
  parallel: False
  action_repeat: 4
  train_ratio: 512
  prefill: 0
  time_limit: 4500
  grayscale: false
  size: [64, 64]
  video_pred_log: true
  eval_episode_num: 2
  eval_every: 1e4
  log_every: 2e3
  actor: {dist: 'onehot', std: 'none'}
  imag_gradient: 'reinforce'
  mario_action_set: 'simple'
  mario_sticky_jump_frames: 0
  mario_flag_base_bonus: 300.0
  mario_time_bonus_scale: 1.0
  mario_score_scale: 0.0
  mario_death_penalty: 0.0

# Rescue v2 (plan B+): wipe stale episodes, heavy death penalty.
#   * latest.pt kept from mario_run1 (world-model weights preserved).
#   * train_eps/eval_eps wiped so the reward-head trains only on fresh data
#     that consistently labels pit-death / enemy-death as very negative.
#   * death_penalty=200 makes the signal impossible to ignore despite its rarity.
# Expected reward math:
#   die at x=900   : 45 - 200 = -155
#   die at x=2900  : 145 - 200 = -55
#   time-out at x=3200 : 160
#   flag_get (worst) : ~260   (forward 160 + flag 100)
mario_rescue:
  task: mario_1-1
  steps: 2e5
  envs: 1
  parallel: False
  action_repeat: 4
  train_ratio: 512
  prefill: 3000
  # time_limit in YAML gets divided by action_repeat=4 in dreamer.py before
  # being passed to the env. We want the Mario env to see time_limit >= 12000
  # raw frames (well past NES in-game timer cutoff ~9600 raw frames) so the
  # NES death fires FIRST -> death_penalty=200 finally triggers.
  time_limit: 48000
  grayscale: false
  size: [64, 64]
  video_pred_log: false
  eval_episode_num: 2
  eval_every: 1e4
  log_every: 2e3
  actor: {dist: 'onehot', std: 'none', entropy: 3e-3}
  imag_gradient: 'reinforce'
  mario_action_set: 'simple'
  mario_sticky_jump_frames: 0
  mario_flag_base_bonus: 100.0
  mario_time_bonus_scale: 0.0
  mario_score_scale: 0.0
  mario_death_penalty: 50.0
  mario_hurdle_bonus: 5.0
  mario_hurdle_spacing: 200

# High-value stage: DreamerV3 + Plan2Explore.
# Keep all current reward shaping, but switch exploration from greedy to
# curiosity-driven plan2explore to escape long plateaus around x~2000.
mario_plan2explore:
  task: mario_1-1
  steps: 7e5
  envs: 1
  parallel: False
  action_repeat: 4
  train_ratio: 512
  prefill: 0
  time_limit: 48000
  grayscale: false
  size: [64, 64]
  video_pred_log: false
  eval_episode_num: 2
  eval_every: 1e4
  log_every: 2e3
  actor: {dist: 'onehot', std: 'none', entropy: 3e-3}
  imag_gradient: 'reinforce'
  expl_behavior: 'plan2explore'
  expl_until: 7e5
  expl_extr_scale: 1.0
  expl_intr_scale: 0.3
  disag_models: 5
  disag_layers: 3
  disag_units: 256
  disag_action_cond: False
  mario_action_set: 'simple'
  mario_sticky_jump_frames: 0
  mario_flag_base_bonus: 100.0
  mario_time_bonus_scale: 0.0
  mario_score_scale: 0.0
  mario_death_penalty: 50.0
  mario_hurdle_bonus: 5.0
  mario_hurdle_spacing: 200
  # Encourage faster play and steady approach to the goal.
  mario_step_penalty: 0.005
  mario_goal_potential_scale: 0.01
  mario_goal_potential_gamma: 1.0
  mario_goal_x: 3161

debug:
  debug: True
  pretrain: 1
  prefill: 1
  batch_size: 10
  batch_length: 20
